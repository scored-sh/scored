slug: resend-cli
name: Resend CLI
command: resend
vendor: Resend
description: "Send emails, manage domains, and run diagnostics. Auto-JSON when piped to agents."
repo: resend/resend-cli
category: communication-email
website: https://resend.com

language: typescript
license: MIT
official: true

install:
  npm: resend-cli
  homebrew: resend/cli/resend
  binary: https://github.com/resend/resend-cli/releases
  curl: "https://resend.com/install.sh"

auth:
  methods: [api_key_env, api_key_flag, config_file]
  env_var: RESEND_API_KEY
  config_path: "~/.config/resend/credentials.json"
  config_format: json
  headless: true
  multi_profile: true

json_output:
  type: auto_pipe
  flag: "--json"
  field_selection: false
  jq_builtin: false

non_interactive:
  fully_headless: true
  skip_prompts_flag: null
  env_var: null
  auto_detect_tty: true

errors:
  structured: true
  format: json
  has_error_codes: true

exit_codes:
  documented: true
  typed: false
  codes:
    "0": success
    "1": error

schema_discovery:
  help_format: standard
  introspection_command: null
  field_docs: false
  resource_listing: null

pagination:
  supported: false
  limit_flag: null
  cursor_flags: null
  auto_paginate: null

safety:
  dry_run: false
  confirm_skip: null
  idempotency: false

quiet_mode:
  flag: "--quiet"
  env_var: null

agent_ecosystem:
  skill_md: false
  skills_count: null
  skills_sh: false
  mcp_server: none
  agents_md: false
  claude_md: false
  agent_detection: true

tags: [email, transactional, agent-first, auto-json]
first_release: null
added_date: "2026-03-19"
updated_date: "2026-03-19"

notable_commands:
  - "resend emails send --from you@domain.com --to user@example.com --subject Test --text Hello"
  - "resend doctor"
  - "resend login --key re_xxx"
  - "resend auth switch"
notable_features:
  - "Auto-JSON when piped — detects non-TTY and switches output format"
  - "Explicit agent contract documented: all flags, JSON stdout, 0/1 exit"
  - "resend doctor detects AI agent integrations (Cursor, Claude, OpenClaw)"
  - "Multi-profile support for team/account switching"
  - "Structured error codes (auth_error, send_error, etc.)"
alternatives: [postmark-cli, twilio-cli]
related: []
