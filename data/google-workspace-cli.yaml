slug: google-workspace-cli
name: Google Workspace CLI
command: gws
vendor: Google
description: "One CLI for all of Google Workspace — Drive, Gmail, Calendar, Sheets, Docs, Chat, Admin. Dynamically built from Discovery Service."
repo: googleworkspace/cli
category: productivity-workspace
website: https://workspace.google.com

language: rust
license: Apache-2.0
official: false

install:
  npm: "@googleworkspace/cli"
  homebrew: googleworkspace-cli
  binary: https://github.com/googleworkspace/cli/releases
  cargo: "--git https://github.com/googleworkspace/cli"
  nix: "github:googleworkspace/cli"

auth:
  methods: [oauth_browser, service_account, api_key_env, config_file]
  env_var: GOOGLE_WORKSPACE_CLI_TOKEN
  config_path: "~/.config/gws/"
  config_format: json
  headless: true
  multi_profile: true

json_output:
  type: default_json
  flag: null
  field_selection: true
  jq_builtin: false

non_interactive:
  fully_headless: true
  skip_prompts_flag: null
  env_var: null
  auto_detect_tty: true

errors:
  structured: true
  format: json
  has_error_codes: true

exit_codes:
  documented: true
  typed: true
  codes:
    "0": success
    "1": api_error
    "2": auth_error
    "3": validation_error
    "4": discovery_error
    "5": internal_error

schema_discovery:
  help_format: json
  introspection_command: "gws schema <service>.<method>"
  field_docs: true
  resource_listing: "gws --help"

pagination:
  supported: true
  limit_flag: "--page-limit"
  cursor_flags: null
  auto_paginate: "--page-all"

safety:
  dry_run: true
  confirm_skip: null
  idempotency: true

quiet_mode:
  flag: null
  env_var: GOOGLE_WORKSPACE_CLI_LOG

agent_ecosystem:
  skill_md: true
  skills_count: 100
  skills_sh: true
  mcp_server: none
  agents_md: false
  claude_md: false
  agent_detection: false

tags: [google, workspace, gmail, drive, calendar, sheets, docs, chat, admin, agent-first]
first_release: null
added_date: "2026-03-19"
updated_date: "2026-03-19"

notable_commands:
  - "gws drive files list --params '{\"pageSize\": 10}'"
  - "gws schema drive.files.list"
  - "gws gmail +send --to alice@example.com --subject Hello --body Hi"
  - "gws calendar +agenda"
  - "gws workflow +standup-report"
notable_features:
  - "Dynamic command surface from Google Discovery Service — never goes stale"
  - "Schema introspection via gws schema command"
  - "--dry-run and --sanitize (Model Armor) safety rails"
  - "100+ agent skills with SKILL.md, available on skills.sh"
  - "NDJSON streaming for paginated results"
alternatives: []
related: [firebase-cli]
