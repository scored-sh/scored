slug: vercel-cli
name: Vercel CLI
command: vercel
vendor: Vercel
description: "Deploy, preview, and ship from the terminal with full project management."
repo: vercel/vercel
category: cloud-infrastructure
website: https://vercel.com

language: typescript
license: Apache-2.0
official: true

install:
  npm: vercel

auth:
  methods: [oauth_browser, api_key_flag, sso]
  env_var: null
  config_path: "~/.vercel/"
  config_format: json
  headless: true
  multi_profile: true

json_output:
  type: flag_json
  flag: "--json"
  field_selection: false
  jq_builtin: false

non_interactive:
  fully_headless: true
  skip_prompts_flag: "--yes"
  env_var: null
  auto_detect_tty: false

errors:
  structured: false
  format: mixed
  has_error_codes: false

exit_codes:
  documented: false
  typed: false
  codes:
    "0": success
    "1": error

schema_discovery:
  help_format: standard
  introspection_command: null
  field_docs: false
  resource_listing: "vercel help"

pagination:
  supported: true
  limit_flag: null
  cursor_flags: null
  auto_paginate: null

safety:
  dry_run: false
  confirm_skip: "--yes"
  idempotency: false

quiet_mode:
  flag: null
  env_var: null

agent_ecosystem:
  skill_md: false
  skills_count: null
  skills_sh: true
  mcp_server: built_in
  agents_md: false
  claude_md: false
  agent_detection: false

tags: [hosting, deployment, serverless, jamstack, nextjs]
first_release: null
added_date: "2026-03-19"
updated_date: "2026-03-19"

notable_commands:
  - "vercel deploy --prod"
  - "vercel env pull .env.local"
  - "vercel api /v2/user"
  - "vercel mcp"
  - "vercel logs <deployment-url> --follow"
notable_features:
  - "Built-in MCP server via vercel mcp command"
  - "vercel api for raw API access (beta)"
  - "Project linking for context-aware commands"
  - "vercel curl for deployment requests with auto-bypass"
  - "skills.sh publisher — Vercel backs the agent skills ecosystem"
alternatives: [netlify-cli, railway-cli, fly-cli]
related: []
