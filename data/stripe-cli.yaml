slug: stripe-cli
name: Stripe CLI
command: stripe
vendor: Stripe
description: "Test webhooks, tail API logs, trigger events, and CRUD any Stripe API object."
repo: stripe/stripe-cli
category: payments-finance
website: https://stripe.com

language: go
license: Apache-2.0
official: true

install:
  homebrew: stripe/stripe-cli/stripe
  binary: https://github.com/stripe/stripe-cli/releases
  scoop: stripe
  docker: stripe/stripe-cli
  apt: https://stripe.com/docs/stripe-cli#install

auth:
  methods: [oauth_browser, api_key_env, api_key_flag, config_file]
  env_var: STRIPE_API_KEY
  config_path: "~/.config/stripe/config.toml"
  config_format: toml
  headless: true
  multi_profile: true

json_output:
  type: partial
  flag: "--print-json"
  field_selection: false
  jq_builtin: false

non_interactive:
  fully_headless: true
  skip_prompts_flag: "--confirm"
  env_var: null
  auto_detect_tty: false

errors:
  structured: true
  format: mixed
  has_error_codes: true

exit_codes:
  documented: false
  typed: false
  codes:
    "0": success
    "1": error

schema_discovery:
  help_format: structured
  introspection_command: null
  field_docs: false
  resource_listing: "stripe resources"

pagination:
  supported: true
  limit_flag: "--limit"
  cursor_flags: ["--starting-after", "--ending-before"]
  auto_paginate: null

safety:
  dry_run: false
  confirm_skip: "--confirm"
  idempotency: true

quiet_mode:
  flag: null
  env_var: null

agent_ecosystem:
  skill_md: false
  skills_count: null
  skills_sh: false
  mcp_server: separate_repo
  agents_md: false
  claude_md: false
  agent_detection: true

tags: [payments, webhooks, testing, fintech, api-first]
first_release: null
added_date: "2026-03-19"
updated_date: "2026-03-19"

notable_commands:
  - "stripe listen --forward-to localhost:3000/webhook"
  - "stripe trigger payment_intent.succeeded"
  - "stripe customers list --limit 50"
  - "stripe get /v1/charges/ch_xxx --expand charges.data.customer"
  - "stripe fixtures ./test-data.json"
notable_features:
  - "Webhook testing: stripe listen + stripe trigger for local testing"
  - "Fixtures: JSON-scripted API sequences for test data"
  - "Full API coverage via resource commands + HTTP commands (get/post/delete)"
  - "Cursor-based pagination with --starting-after/--ending-before"
  - "Idempotency key support via --idempotency flag"
alternatives: []
related: []
